<!DOCTYPE html>
<html lang="en" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi perfil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html {
            scroll-behavior: smooth;
        }

        /* 🔥 FONDO CORREGIDO */
        body {
            background-image: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
            url('https://i.pinimg.com/736x/79/f7/35/79f735bdc978bb91c3459899cad1a99a.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
        }

        /* HEADER */
        header {
            backdrop-filter: blur(10px);
            background-color: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 10px 20px;
        }

        /* NAV */
        .nav-masthead .nav-link {
            color: rgba(206, 206, 231, 0.7);
            border-bottom: .2rem solid transparent;
            transition: 0.3s;
        }

        .nav-masthead .nav-link:hover {
            color: white;
            border-bottom-color: white;
        }

        .nav-masthead .active {
            color: white;
            border-bottom-color: white;
        }

        /* SECCIÓN */
        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* TEXTO */
        h1 {
            color: white;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0,0,0,0.7);
        }

        p {
            color: rgba(255,255,255,0.85);
        }

        /* BOTÓN */
        .btn-custom {
            background-color: transparent;
            color: white;
            border: 1px solid white;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: white;
            color: black;
        }

        footer {
            background-color: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body class="text-center d-flex flex-column h-100">

<div class="container">

    <!-- HEADER -->
    <header class="d-flex justify-content-between align-items-center py-3 mt-3">
        <h5 class="mb-0">Carolina Rodriguez Bobrosky</h5>

        <nav class="nav nav-masthead">
            <a class="nav-link active" href="#inicio">Inicio</a>
            <a class="nav-link" href="blog_test.html">Mi blog</a>
        </nav>
    </header>

    <!-- SECCIÓN -->
    <section id="inicio">

        <h1 class="display-5">Bienvenido a mi perfil</h1>

        <p class="lead mt-3">
            Este es un espacio donde muestro lo que hago en la escuela y por fuera de ella.
        </p>

        <a href="blog_test.html" class="btn btn-custom mt-3">
            Ir a mi blog
        </a>

    </section>

</div>

<footer class="mt-auto text-white-50 text-center">
    <p>
        Template <a href="https://getbootstrap.com/" class="text-white">Bootstrap</a> · ORT Rosario
    </p>
</footer>

</body>
</html>
